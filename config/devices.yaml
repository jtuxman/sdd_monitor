devices:
  # Ejemplo dispositivo SNMP v2c
  - name: switch-core
    host: 172.16.0.1
    port: 161               # Puerto SNMP (por defecto 161)
    snmp_version: 2c
    community: Morelos       # Community string de solo lectura
    timeout: 2              # Segundos de espera por respuesta
    retries: 1              # Reintentos ante timeout
    oids:
      - 1.3.6.1.2.1.1.1.0        # sysDescr: descripción del sistema
      - 1.3.6.1.2.1.1.3.0        # sysUpTime: tiempo de actividad
      - 1.3.6.1.2.1.2.1.0        # ifNumber: número de interfaces
      - 1.3.6.1.4.1.9.9.109.1.1.1.1.8 #promedio carga 5 minutos
